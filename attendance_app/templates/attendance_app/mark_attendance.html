{% extends 'attendance_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3>Введите код с экрана</h3>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="otp" class="form-label">6-значный код</label>
                <input type="text" class="form-control form-control-lg text-center" 
                       id="otp" name="otp" placeholder="123456" 
                       maxlength="6" required autofocus 
                       style="font-size: 2rem; letter-spacing: 10px;">
            </div>
            <button type="submit" class="btn btn-primary w-100">Отметиться</button>
        </form>
        <p class="mt-3 text-muted text-center">Код действителен 30 секунд.</p>
    </div>
</div>
{% endblock %}
